<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niddo — Seu cão cresce. A gente te acompanha.</title>
    <meta name="description" content="Niddo é o app que te guia na jornada com seu cão. Comportamento, rotina e bem-estar.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #2C2C2A;
            background: #FAFAF7;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 480px;
        }
        .logo {
            width: 180px;
            margin-bottom: 12px;
        }
        .maya {
            width: 200px;
            margin-bottom: 12px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #3D52D5;
            margin-bottom: 8px;
        }
        .tags {
            font-size: 14px;
            color: #999;
            font-weight: 500;
            margin-bottom: 36px;
        }
        .store-links {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 48px;
            flex-wrap: wrap;
        }
        .store-btn {
            display: inline-block;
            background: #3D52D5;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .store-btn:hover {
            background: #2E41B0;
        }
        .footer-links {
            display: flex;
            gap: 24px;
            justify-content: center;
        }
        .footer-links a {
            color: #999;
            font-size: 13px;
            text-decoration: none;
        }
        .footer-links a:hover {
            color: #3D52D5;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo-fundo-transparente.png" alt="Niddo" class="logo">
        <img src="maya-filhote-intro.png" alt="Maya" class="maya">
        <h1>Seu cão cresce. A gente te acompanha.</h1>
        <p class="tags">Comportamento · Rotina · Bem-estar</p>
        <div class="store-links">
            <a href="#" class="store-btn">App Store</a>
            <a href="#" class="store-btn">Google Play</a>
        </div>
        <div class="footer-links">
            <a href="/privacidade">Política de Privacidade</a>
            <a href="/termos">Termos de Uso</a>
        </div>
    </div>
</body>
</html>
